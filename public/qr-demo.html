<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedMe - QR Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .phone-mockup { width: 340px; height: 680px; border: 14px solid #1f2937; border-radius: 40px; margin: 0 auto; background: #000; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .phone-screen { background: white; width: 100%; height: 100%; display: flex; flex-direction: column; }
        .scan-line { width: 100%; height: 4px; background: rgba(34,197,94,0.9); position: absolute; top: 0; box-shadow: 0 0 15px rgba(34,197,94,0.9); animation: scan 2s infinite ease-in-out; display: none; }
        @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">QR Scanning Simulation</div>
        <div><a href="/" class="btn btn-outline">Back to Home</a></div>
    </nav>
    <div class="container mt-2 text-center">
        <p class="mb-2 text-muted" style="font-size: 18px;">This simulates the exact process when a patient visits a hospital and presents their MedMe QR card to the doctor.</p>
        <div class="phone-mockup">
            <div class="phone-screen" id="screenContent">
                <div style="background: var(--primary); color: white; padding: 20px; padding-top: 40px;">
                    <h3 style="margin:0;">Doctor's Scanner App</h3>
                </div>
                <div style="padding: 20px;">
                    <div style="border: 2px dashed #94a3b8; width: 220px; height: 220px; margin: 40px auto; position: relative; background: #f8fafc; display: flex; align-items: center; justify-content: center; border-radius: 12px; overflow: hidden;">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=DemoPatient" style="width:180px; height:180px; opacity: 0.8;">
                        <div class="scan-line" id="scanLine"></div>
                    </div>
                    <button class="btn btn-primary" style="width: 100%; font-size: 18px; padding: 15px;" id="scanBtn" onclick="simulateScan()">Scan Patient QR Card</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/tour.js"></script>
    <script>
        function simulateScan() {
            document.getElementById('scanLine').style.display = 'block';
            document.getElementById('scanBtn').style.opacity = '0.5';
            document.getElementById('scanBtn').innerText = 'Scanning...';
            setTimeout(() => {
                document.getElementById('screenContent').innerHTML = `
                    <div style="background: var(--success); color: white; padding: 20px; padding-top: 40px;">
                        <h3 style="margin:0;">✅ Scan Successful</h3>
                    </div>
                    <div style="padding: 20px; text-align: left;">
                        <h2 style="color: var(--primary);">Patient: Ayaan Khan</h2>
                        <p class="text-muted" style="margin-bottom: 20px;">System ID: 1 | Blood Group: O+</p>
                        
                        <div style="background: #fff1f2; padding: 15px; border-radius: 8px; border: 1px solid #fda4af; margin-bottom: 20px;">
                            <strong style="color: #9f1239; font-size: 16px;">⚠️ Warning: Family Risk</strong>
                            <p style="font-size: 13px; color: #be123c; margin-top: 5px;">High probability of Diabetes detected in family health tree.</p>
                        </div>
                        
                        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px;">The doctor can now securely access the complete medical history.</p>
                        <button class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 16px;" onclick="window.location.href='/viewer.html?type=patient&id=1'">Open Full Patient Record</button>
                    </div>
                `;
            }, 2500);
        }
    </script>
</body>
</html>
